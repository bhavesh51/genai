apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: multi-agent-platform
images:
  - name: quay.io/enterprise/multi-agent-platform
    newTag: "1.0.0"
patches:
  - target:
      kind: Deployment
      name: multi-agent-platform
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

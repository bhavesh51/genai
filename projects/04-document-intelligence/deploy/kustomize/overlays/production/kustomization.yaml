apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: document-intelligence
images:
  - name: quay.io/enterprise/document-intelligence
    newTag: "1.0.0"
patches:
  - target:
      kind: Deployment
      name: document-intelligence
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

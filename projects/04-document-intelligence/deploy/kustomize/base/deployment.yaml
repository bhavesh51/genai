---
# Project 4 – Document Intelligence
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-intelligence
  namespace: document-intelligence
  labels:
    app: document-intelligence
    version: "1.0.0"
    app.kubernetes.io/part-of: genai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-intelligence
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: document-intelligence
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: docint-service-account
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: docint-api
          image: quay.io/enterprise/document-intelligence:1.0.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LLM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: docint-config
                  key: LLM_BASE_URL
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rhoai-api-secret
                  key: api-key
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: docint-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: url
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: odf-s3-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: odf-s3-secret
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - mountPath: /tmp
              name: tmp-dir
      volumes:
        - name: tmp-dir
          emptyDir:
            sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: document-intelligence
  namespace: document-intelligence
spec:
  selector:
    app: document-intelligence
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: document-intelligence
  namespace: document-intelligence
  annotations:
    haproxy.router.openshift.io/timeout: 180s
spec:
  to:
    kind: Service
    name: document-intelligence
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: docint-config
  namespace: document-intelligence
data:
  LLM_BASE_URL: "https://granite-3-1-8b-instruct-predictor.rhoai-model-serving.svc.cluster.local/v1"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster-kafka-bootstrap.amq-streams.svc.cluster.local:9092"
  KAFKA_TOPIC_INGEST: "document-ingest"
  KAFKA_TOPIC_RESULTS: "document-results"
  S3_ENDPOINT: "https://s3.openshift-storage.svc.cluster.local"
  S3_BUCKET_DOCUMENTS: "document-intelligence-raw"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"

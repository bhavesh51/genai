---
# Project 8 – Educational Content Generator
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: educational-content-generator
  namespace: educational-content-generator
  labels:
    app: educational-content-generator
    version: "1.0.0"
    app.kubernetes.io/part-of: genai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: educational-content-generator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: educational-content-generator
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: educational-content-generator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: educational-content-generator
          image: quay.io/enterprise/educational-content-generator:1.0.0
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: educational-content-generator-config
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-secret
                  key: api-key
            - name: MILVUS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: milvus-secret
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmp-dir
      volumes:
        - name: tmp-dir
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: educational-content-generator
  namespace: educational-content-generator
  labels:
    app: educational-content-generator
spec:
  selector:
    app: educational-content-generator
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: educational-content-generator
  namespace: educational-content-generator
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  to:
    kind: Service
    name: educational-content-generator
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: educational-content-generator-hpa
  namespace: educational-content-generator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: educational-content-generator
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: educational-content-generator-config
  namespace: educational-content-generator
data:
  SERVICE_NAME: "educational-content-generator"
  LOG_LEVEL: "INFO"
  LLM_BASE_URL: "http://llm-gateway/v1"
  LLM_MODEL_NAME: "meta-llama/Meta-Llama-3-8B-Instruct"
  LLM_MAX_TOKENS: "2048"
  LLM_TEMPERATURE: "0.5"
  EMBEDDING_BASE_URL: "http://embedding-gateway/v1"
  EMBEDDING_MODEL_NAME: "sentence-transformers/all-mpnet-base-v2"
  EMBEDDING_DIMENSION: "768"
  MILVUS_HOST: "milvus.milvus.svc.cluster.local"
  MILVUS_PORT: "19530"
  MILVUS_USER: "root"
  MILVUS_COLLECTION: "curriculum_chunks"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_SESSION_TTL: "7200"
  REDIS_MASTERY_TTL: "604800"
  REDIS_QUIZ_TTL: "3600"
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/education"
  BKT_P_INIT: "0.3"
  BKT_P_LEARN: "0.2"
  BKT_P_FORGET: "0.05"
  BKT_P_GUESS: "0.25"
  BKT_P_SLIP: "0.1"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "educational-content-generator"

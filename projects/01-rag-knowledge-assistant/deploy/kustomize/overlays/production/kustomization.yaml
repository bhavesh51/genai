apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: rag-knowledge-assistant

images:
  - name: quay.io/enterprise/rag-knowledge-assistant
    newTag: "1.0.0"

patches:
  - target:
      kind: Deployment
      name: rag-knowledge-assistant
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi

configMapGenerator:
  - name: rag-config
    behavior: merge
    literals:
      - LOG_LEVEL=WARNING

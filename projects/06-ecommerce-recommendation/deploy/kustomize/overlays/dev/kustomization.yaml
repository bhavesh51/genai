apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce-recommendation-dev

bases:
  - ../../base

patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ecommerce-recommendation
    spec:
      replicas: 1

commonLabels:
  environment: dev

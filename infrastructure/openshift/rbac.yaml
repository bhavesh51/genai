---
# ClusterRole: GenAI Operator — full platform admin
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: genai-platform-operator
rules:
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices", "servingruntimes"]
    verbs: ["*"]
  - apiGroups: ["datasciencecluster.opendatahub.io"]
    resources: ["datascienceclusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubeflow.org"]
    resources: ["pytorchjobs", "tfjobs"]
    verbs: ["*"]
---
# ClusterRole: GenAI Developer — project-level access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: genai-platform-developer
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["get", "list", "watch"]
---
# ClusterRole: GenAI Viewer — read-only
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: genai-platform-viewer
rules:
  - apiGroups: ["", "apps", "serving.kserve.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
# Service Account: RAG service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-service-account
  namespace: rag-knowledge-assistant
  annotations:
    # Vault agent injection annotation
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "rag-service"
---
# Service Account: Agent platform
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-service-account
  namespace: multi-agent-platform
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "agent-service"
---
# Service Account: Document intelligence
apiVersion: v1
kind: ServiceAccount
metadata:
  name: docint-service-account
  namespace: document-intelligence
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "docint-service"

---
# vLLM Serving Runtime for IBM Granite / Mistral on RHOAI 3.x
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: rhoai-model-serving
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/template-display-name: "vLLM ServingRuntime for KServe"
    opendatahub.io/template-name: "vllm-runtime"
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
  containers:
    - name: kserve-container
      image: quay.io/rhoai/vllm:latest-gpu
      command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
      args:
        - "--port=8080"
        - "--model=/mnt/models"
        - "--served-model-name={{.Name}}"
        - "--max-model-len=16384"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.90"
        - "--enable-prefix-caching"
        - "--trust-remote-code"
      env:
        - name: HF_HOME
          value: /tmp/hf_home
        - name: TRANSFORMERS_CACHE
          value: /tmp/transformers_cache
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: 48Gi
          nvidia.com/gpu: "1"
      volumeMounts:
        - mountPath: /dev/shm
          name: shm
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 2Gi
---
# IBM Granite 3.1 8B Instruct – InferenceService
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-3-1-8b-instruct
  namespace: rhoai-model-serving
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    security.opendatahub.io/enable-auth: "true"
spec:
  predictor:
    maxReplicas: 3
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ""
      resources:
        requests:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: 48Gi
          nvidia.com/gpu: "1"
      runtime: vllm-runtime
      storage:
        key: aws-connection-model-storage
        path: models/granite-3.1-8b-instruct
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
# Mistral 7B Instruct – InferenceService
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: mistral-7b-instruct
  namespace: rhoai-model-serving
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    security.opendatahub.io/enable-auth: "true"
spec:
  predictor:
    maxReplicas: 2
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      resources:
        requests:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: 32Gi
          nvidia.com/gpu: "1"
      runtime: vllm-runtime
      storage:
        key: aws-connection-model-storage
        path: models/mistral-7b-instruct
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
